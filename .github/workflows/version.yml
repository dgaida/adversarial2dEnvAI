name: Auto Version and Badges

on:
  push:
    branches: [ main, master ]

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    - name: Auto Version Action
      uses: dgaida/auto-version-action@v1
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        create-badge: true
