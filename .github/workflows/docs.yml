name: Documentation

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e .[dev]
          pip install interrogate git-cliff mkdocs-material mkdocstrings[python] mkdocs-static-i18n mkdocs-mermaid2-plugin mike

      - name: Run tests
        run: |
          PYTHONPATH=src python3 -m pytest

      - name: Check API doc coverage
        run: |
          interrogate src/ --fail-under 95 --generate-badge docs/assets/interrogate.svg

      - name: Collect Metrics
        run: |
          echo "{\"last_run\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\"}" > docs/assets/metrics.json

      - name: Generate Changelog
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git-cliff --tag ${{ github.ref_name }} > CHANGELOG.md

      - name: Build and Deploy Docs
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages --depth=1
          if [ -n "${{ github.event.ref }}" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            mike deploy --push --update-aliases ${{ github.ref_name }} latest
          else
            mike deploy --push --update-aliases dev
          fi
          mike set-default --push latest || mike set-default --push dev

      - name: Build Docs (PR check)
        if: github.event_name == 'pull_request'
        run: |
          mkdocs build --strict
