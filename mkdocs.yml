site_name: CustomGrid Environment
site_description: Eine Gymnasium-basierte Gitterumgebung mit einem Agenten und einem Geist.
site_author: Jules
repo_url: https://github.com/user/custom_grid_env
edit_uri: edit/main/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
  - mermaid2
  - mike

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage:
      - Environment: usage/environment.md
      - Gameplay: usage/gameplay.md
      - Observations: usage/observations.md
      - Rewards: usage/rewards.md
  - API Reference:
      - Core API: api/core.md
      - Agents: api/agents.md
  - Architecture: architecture/index.md
  - Development:
      - Guide: development/index.md
      - Style Guide: development/style-guide.md
  - Troubleshooting: troubleshooting.md
  - Metrics: metrics.md
