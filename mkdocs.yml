site_name: CustomGrid Environment
site_description: An advanced Gymnasium-based grid environment for Reinforcement Learning and Robotics tutorials.
site_author: Jules
site_url: https://dgaida.github.io/adversarial2dEnvAI/
repo_url: https://github.com/dgaida/adversarial2dEnvAI
edit_uri: edit/master/docs/

theme:
  name: material
  language: de
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
    - content.tabs.link
    - navigation.tracking

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: de
          name: Deutsch
          default: true
          build: true
        - locale: en
          name: English
          build: true
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
            merge_init_into_class: true
  - mermaid2
  - mike:
      alias_type: symlink

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage:
      - Environment: usage/environment.md
      - Gameplay: usage/gameplay.md
      - Observations: usage/observations.md
      - Rewards: usage/rewards.md
      - Localization: usage/localization.md
  - API Reference:
      - Core API: api/core.md
      - Agents: api/agents.md
  - Architecture: architecture/index.md
  - Tutorials:
      - CNN Training: tutorial/cnn.md
      - Particle Filter: tutorial/particle_filter.md
      - Adversarial Search: tutorial/adversarial_search.md
  - Development:
      - Guide: development/index.md
      - Docstring Standard: development/docstring-guide.md
      - Changelog Workflow: development/changelog.md
      - Versioning Guide: development/versioning.md
      - Style Guide: development/style-guide.md
  - Troubleshooting: troubleshooting.md
  - Metrics: metrics.md
